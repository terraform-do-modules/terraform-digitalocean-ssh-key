name: PR Validation
on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      
permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  pr-validation:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/pr_checks.yml@fix/pr-validation
    secrets: inherit
    with:
      subjectPattern: '^.+$'